name: Pre-Commit
on:
  push:
    branches:
    - main
  pull_request: {}

permissions:
  contents: read
  pull-requests: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - uses: jdx/mise-action@v4
    - uses: pre-commit/action@v3.0.1
      with:
        extra_args: --from-ref origin/${{ github.base_ref }} --to-ref HEAD
